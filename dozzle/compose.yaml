services:
  dozzle:
    image: amir20/dozzle:latest
    environment:
      - DOZZLE_MODE=swarm
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle_data:/data
    networks:
      - main_app_net
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

volumes:
  dozzle_data:

networks:
  main_app_net:
    external: true
    name: caddy_app_net
